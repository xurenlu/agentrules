name: Verify rule library

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Verify rules and generated artifact
        run: ruby scripts/verify_rules.rb

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rule-verification-report
          path: tmp/rule-verification.*
